<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none" aria-hidden="true">
  <!-- Roo empty chat — slight bow -->
  <!-- Body -->
  <ellipse cx="40" cy="58" rx="16" ry="18" fill="#C8553D" opacity="0.9"/>
  <!-- Tailcoat -->
  <path d="M26 66 Q33 76 40 74 Q47 76 54 66 Q49 72 40 71 Q31 72 26 66Z" fill="#4A2C2A"/>
  <!-- Head tilted in bow -->
  <ellipse cx="40" cy="34" rx="14" ry="16" fill="#C8553D" transform="rotate(-8 40 34)"/>
  <!-- Ears -->
  <ellipse cx="31" cy="21" rx="4" ry="8" fill="#C8553D" transform="rotate(-8 31 21)"/>
  <ellipse cx="50" cy="19" rx="4" ry="8" fill="#C8553D" transform="rotate(-8 50 19)"/>
  <ellipse cx="31" cy="21" rx="2.5" ry="5.5" fill="#E8856F" transform="rotate(-8 31 21)"/>
  <ellipse cx="50" cy="19" rx="2.5" ry="5.5" fill="#E8856F" transform="rotate(-8 50 19)"/>
  <!-- Eyes in bow (looking down slightly) -->
  <circle cx="35" cy="35" r="2" fill="#1C1917"/>
  <circle cx="45" cy="34" r="2" fill="#1C1917"/>
  <!-- Pocket square -->
  <rect x="36" y="48" width="8" height="6" rx="1" fill="#B8860B" opacity="0.9"/>
</svg>
